<body class="selection-gold">

            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: {
                            size: size,
                            class: className
                        },
                        nameAttr: 'data-lucide',
                        icons: { [name]: lucide.icons[name] }
                    });

                            </div>

                                    Agendar
                                </button>
                                <button 
                                    onClick={() => setIsMenuOpen(!isMenuOpen)}

                                                activeTab === tabId ? 'text-gold' : 'text-stone-500'
